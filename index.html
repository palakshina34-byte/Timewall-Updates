<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeWall — Updates</title>
<style>
  :root{
    --blue:#2D6CDF;
    --blue-dark:#1E54B8;
    --ink:#1B1F27;
    --gray:#6B7280;
    --line:#E7E9EE;
    --bg:#FFFFFF;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height:1.5;
  }

  .wrap{
    max-width:620px;
    margin:0 auto;
    padding:56px 24px 64px;
  }

  /* Header */
  .app{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:36px;
  }
  .app img{
    width:56px;
    height:56px;
    border-radius:14px;
    display:block;
  }
  .app-name{
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .app-sub{
    font-size:14px;
    color:var(--gray);
    margin-top:2px;
  }

  /* Version row */
  .version-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    padding:18px 20px;
    border:1px solid var(--line);
    border-radius:12px;
    margin-bottom:28px;
  }
  .version-tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:15px;
  }
  .version-tag .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--blue);
  }
  .version-date{
    font-size:13px;
    color:var(--gray);
  }

  /* Status */
  .status-box{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:28px 20px;
    text-align:center;
    font-size:15px;
    color:var(--gray);
  }
  .status-box strong{
    color:var(--ink);
  }
  .status-box .check{
    width:22px;
    height:22px;
    flex-shrink:0;
    border-radius:50%;
    background:var(--blue);
    color:#fff;
    font-size:13px;
    font-weight:700;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  /* Footer */
  footer{
    margin-top:56px;
    padding-top:20px;
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  footer img{
    height:14px;
    display:block;
  }
  footer span{
    font-size:12px;
    color:var(--gray);
  }

  @media (max-width:480px){
    .wrap{ padding:40px 18px 48px; }
    .app img{ width:48px; height:48px; }
    .app-name{ font-size:19px; }
  }
</style>
</head>
